    <circle cx="850" cy="505" r="30" fill="#333333"/>
    <text x="850" y="626" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="72" fill="#333333">0</text>

    <!-- seven surrounding points -->
    <g fill="#333333">
      <circle cx="260" cy="239" r="52"/>
      <circle cx="406" cy="305" r="28"/>
      <circle cx="1074" cy="356" r="40"/>
      <circle cx="231" cy="786" r="39"/>
